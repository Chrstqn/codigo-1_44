<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Detalle de Película - CinePlus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-4">
      <h2 id="titulo" class="mb-3 text-uppercase fw-bold"></h2>

      <div class="alert alert-info" role="alert">
        ¡Disfruta del tráiler oficial y conoce más sobre esta película!
      </div>

      <div class="ratio ratio-16x9 mb-4 shadow-sm rounded">
        <iframe id="trailer" src="" allowfullscreen></iframe>
      </div>
    </div>

    <div class="card mb-4 shadow border-0">
      <div class="row g-0">
        <div class="col-md-4">
          <img id="poster" src="" class="img-fluid rounded-start" alt="Poster de la película" />
        </div>
        <div class="col-md-8">
          <div class="card-body p-4">
            <h5 class="card-title fw-bold">Sinopsis</h5>
            <p id="sinopsis" class="card-text text-muted"></p>

            <hr>
            
            <div id="contenedor-badges">
                <span id="genero" class="badge bg-secondary p-2"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center">
      <a href="../index.html" class="btn btn-outline-dark px-5">Volver al inicio</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script>
    $(function () {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get("id");

      $.ajax({
        url: "../data/peliculas.json",
        method: "GET",
        dataType: "json",
        success: function (peliculas) {
          const peli = peliculas.find((p) => p.id == id);
          
          if (peli) {
            // Lógica de Precios
            const hoy = new Date();
            const fechaE = new Date(peli.estreno);
            const esEstreno = (hoy - fechaE) / (1000 * 60 * 60 * 24) <= 30;
            const precio = esEstreno ? peli.precios.estreno : peli.precios.normal;
            const badgeClase = esEstreno ? 'bg-danger' : 'bg-primary';
            const badgeTexto = esEstreno ? 'ESTRENO' : 'REGULAR';

            // Inyectar datos en el HTML
            $("#titulo").text(peli.titulo);
            $("#poster").attr("src", "../" + peli.imagen); // Ruta corregida
            $("#sinopsis").text(peli.sinopsis);
            $("#trailer").attr("src", peli.trailer);
      
            $("#genero").text(peli.generos.join(" | "));

            $("#genero").after(`
              <span class="badge ${badgeClase} ms-2 p-2">${badgeTexto}</span>
              <div class="mt-4">
                <small class="text-muted d-block">Precio de entrada:</small>
                <h3 class="text-success fw-bold">$${precio.toFixed(2)}</h3>
              </div>
            `);
          } else {
            mostrarError();
          }
        },
        error: function () {
          mostrarError();
        }
      });

      function mostrarError() {
        $(".container").html(`
          <div class="alert alert-danger text-center my-5" role="alert">
            <h4 class="alert-heading">Error 404</h4>
            <p>La película solicitada no existe en nuestra cartelera.</p>
            <a href="../index.html" class="btn btn-secondary mt-3">Volver al inicio</a>
          </div>
        `);
      }
    });
  </script>
</body>
</html>
