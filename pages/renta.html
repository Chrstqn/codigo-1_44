<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Renta - Toho Cinemas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center mb-4 text-primary fw-bold">Alquiler de Películas</h2>
        
        <form id="form-renta" class="card p-4 shadow border-0 mx-auto" style="max-width: 600px;">
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre Completo</label>
                <input type="text" id="cliente" class="form-control" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Selecciona Películas (puedes elegir varias)</label>
                <select id="peliculas-seleccion" class="form-select" multiple style="height: 150px;" required>
                    </select>
                <small class="text-muted d-block mt-1">
                    <i class="bi bi-info-circle"></i> Mantén presionado <strong>Ctrl</strong> (Windows) o <strong>Cmd</strong> (Mac) para seleccionar varias.
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Días de alquiler</label>
                <input type="number" id="dias" class="form-control" min="1" value="1" required>
            </div>

            <div class="d-flex gap-2 mt-3">
                <a href="../index.html" class="btn btn-outline-secondary w-50">Regresar al Inicio</a>
                <button type="submit" class="btn btn-primary w-50">Procesar Renta</button>
            </div>
        </form>
    </div>

    <div class="modal fade" id="modalRenta" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Resumen de Alquiler</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div id="modal-body-renta" class="modal-body">
                    </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Corregir Selección</button>
                    <button type="button" class="btn btn-success" onclick="confirmarYLimpiar()">Confirmar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/renta.js"></script> 
    
    <script>
        // Función para el botón de Confirmar del Modal
        function confirmarYLimpiar() {
            alert("¡Transacción Exitosa! Disfruta tus películas en Toho Cinemas.");
            $("#form-renta")[0].reset();
            const modalElement = document.getElementById('modalRenta');
            const modalInstance = bootstrap.Modal.getInstance(modalElement);
            modalInstance.hide();
        }
    </script>
</body>
</html>
