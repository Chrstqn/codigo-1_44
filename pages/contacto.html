<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - Toho Cinemas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 bg-white p-4 shadow-sm rounded">
        <h2 class="mb-4 text-primary">Contáctanos</h2>
        <form id="form-contacto" novalidate>
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" required>
            <div class="invalid-feedback">Por favor, ingresa tu nombre.</div>
          </div>

          <div class="mb-3">
            <label for="correo" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" required>
            <div class="invalid-feedback">Ingresa un correo válido.</div>
          </div>

          <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje (20-50 caracteres)</label>
            <textarea 
              class="form-control" 
              id="mensaje" 
              rows="4" 
              minlength="20" 
              maxlength="50" 
              required
            ></textarea>
            <div class="invalid-feedback" id="mensaje-error">
              El mensaje debe tener entre 20 y 50 caracteres.
            </div>
            <div class="form-text">
              Caracteres actuales: <span id="contador-char" class="fw-bold">0</span>/50
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Enviar Mensaje</button>
          
          <div id="alerta" class="alert alert-success mt-3 d-none">
            ¡Mensaje enviado con éxito! Nos pondremos en contacto pronto.
          </div>
        </form>
        
        <div class="text-center mt-4">
            <a href="../index.html" class="text-decoration-none text-muted small">← Volver al inicio</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script>
    $(function () {
        const $form = $('#form-contacto');
        const $mensaje = $('#mensaje');
        const $contador = $('#contador-char');

        //Contador de caracteres en tiempo real
        $mensaje.on('input', function () {
            const total = $(this).val().length;
            $contador.text(total);
            
            if (total < 20 || total > 50) {
                $contador.addClass('text-danger').removeClass('text-success');
            } else {
                $contador.addClass('text-success').removeClass('text-danger');
            }
        });

        // Evento de envío único
        $form.on('submit', function (e) {
            e.preventDefault();
            const form = this;
            const msgVal = $mensaje.val();

            if (msgVal.length < 20 || msgVal.length > 50) {
                $mensaje.addClass('is-invalid');
            } else {
                $mensaje.removeClass('is-invalid').addClass('is-valid');
            }

            if (form.checkValidity() && msgVal.length >= 20 && msgVal.length <= 50) {

                $('#alerta').removeClass('d-none').hide().fadeIn();
                
                setTimeout(() => {
                    $('#alerta').fadeOut(() => $(this).addClass('d-none'));
                }, 3000);

                form.reset();
                $contador.text(0).removeClass('text-success text-danger');
                $(form).removeClass('was-validated');
                $('.form-control').removeClass('is-valid is-invalid');
            } else {
                $(form).addClass('was-validated');
            }
        });
    });
  </script>
</body>
</html>
